<!DOCTYPE html>

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      body { background: #0d0f14; }
      #splash {
        position: fixed; inset: 0; background: #0d0f14;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-ring {
        width: 40px; height: 40px; border-radius: 50%;
        border: 3px solid #2a2d35; border-top-color: #f5c842;
        animation: spin 0.8s linear infinite;
      }
      .splash-text { margin-top: 16px; color: #9ca3af; font-family: sans-serif; font-size: 13px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' });
      });
    }
  </script>
</head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="splash">
    <div class="splash-ring"></div>
    <div class="splash-text">Loading TGCC Line-up…</div>
  </div>
  <div id="root"></div>
  <script src="/_expo/static/js/web/index-562dd11a1f204eb6e187fb4de812012f.js" defer></script>
  <div id="crash-overlay" style="display:none;position:fixed;inset:0;background:#0d0f14;z-index:10000;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;color:#9ca3af;text-align:center;padding:24px;">
    <div style="color:#f5c842;font-size:15px;font-weight:600;margin-bottom:8px;">Something went wrong</div>
    <div style="font-size:13px;margin-bottom:16px;">The app hit an error and couldn't continue.</div>
    <button onclick="window.location.reload()" style="background:#f5c842;color:#1f2937;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;">Reload</button>
  </div>
  <script>
    var _t = setInterval(function() {
      if (document.getElementById('root').children.length > 0) {
        clearInterval(_t);
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 350); }
      }
    }, 50);
    function _showCrash() {
      var c = document.getElementById('crash-overlay');
      if (c) c.style.display = 'flex';
      var s = document.getElementById('splash');
      if (s) s.style.display = 'none';
    }
    window.addEventListener('error', _showCrash);
    window.addEventListener('unhandledrejection', _showCrash);
  </script>
</body>
</html>
